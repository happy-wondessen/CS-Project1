$kind: http-request
name: Get Item by ID
method: GET
url: '{{baseUrl}}/api/items/1'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200 OR 404', function() { pm.expect(pm.response.code).to.be.oneOf([200, 404]); });
      pm.test('If 200: response has id, partNumber, brand, type fields', function() { if (pm.response.code === 200) { var jsonData = pm.response.json(); pm.expect(jsonData).to.have.property('id'); pm.expect(jsonData).to.have.property('partNumber'); pm.expect(jsonData).to.have.property('brand'); pm.expect(jsonData).to.have.property('type'); } });
      pm.test('Response time is less than 2000ms', function() { pm.expect(pm.response.responseTime).to.be.below(2000); });
