$kind: http-request
name: Create Item
method: POST
url: '{{baseUrl}}/api/items'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "partNumber": "PN-001-A",
      "brand": "BrandX",
      "type": "Electronics"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', function() { pm.response.to.have.status(201); });
      pm.test('Response body has id, partNumber, brand, type', function() { var jsonData = pm.response.json(); pm.expect(jsonData).to.have.property('id'); pm.expect(jsonData).to.have.property('partNumber'); pm.expect(jsonData).to.have.property('brand'); pm.expect(jsonData).to.have.property('type'); });
      pm.test('partNumber in response equals "PN-001-A"', function() { var jsonData = pm.response.json(); pm.expect(jsonData.partNumber).to.eql('PN-001-A'); });
      pm.test('Response time is less than 2000ms', function() { pm.expect(pm.response.responseTime).to.be.below(2000); });
