$kind: http-request
name: 'Create Store - Duplicate Location (Negative Test)'
method: POST
url: '{{baseUrl}}/api/stores'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "location": "Nairobi"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 400 (duplicate should be rejected)', function() { pm.response.to.have.status(400); });
      pm.test('Response time is less than 2000ms', function() { pm.expect(pm.response.responseTime).to.be.below(2000); });
