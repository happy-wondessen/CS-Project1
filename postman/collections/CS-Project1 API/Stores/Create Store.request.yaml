$kind: http-request
name: Create Store
method: POST
url: '{{baseUrl}}/api/stores'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "location": "Nairobi"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function() { pm.response.to.have.status(200); });
      pm.test('Response body has id, location', function() { var jsonData = pm.response.json(); pm.expect(jsonData).to.have.property('id'); pm.expect(jsonData).to.have.property('location'); });
      pm.test('location in response equals "Nairobi"', function() { var jsonData = pm.response.json(); pm.expect(jsonData.location).to.eql('Nairobi'); });
      pm.test('Response time is less than 2000ms', function() { pm.expect(pm.response.responseTime).to.be.below(2000); });
