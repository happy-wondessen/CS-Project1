$kind: http-request
name: Create Customer
method: POST
url: '{{baseUrl}}/api/customers'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Alice Wanjiru",
      "phone": "0722000001"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', function() { pm.response.to.have.status(201); });
      pm.test('Response body has id, name, phone', function() { var jsonData = pm.response.json(); pm.expect(jsonData).to.have.property('id'); pm.expect(jsonData).to.have.property('name'); pm.expect(jsonData).to.have.property('phone'); });
      pm.test('name in response equals "Alice Wanjiru"', function() { var jsonData = pm.response.json(); pm.expect(jsonData.name).to.eql('Alice Wanjiru'); });
      pm.test('Response time is less than 2000ms', function() { pm.expect(pm.response.responseTime).to.be.below(2000); });
